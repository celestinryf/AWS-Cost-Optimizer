# Alembic configuration for AWS Cost Optimizer SQLite database.
# The script_location and sqlalchemy.url can be overridden by env vars:
#   ALEMBIC_SCRIPT_LOCATION  (rarely needed)
#   DATABASE_URL             (set this in production, e.g. sqlite:///data/runs.db)

[alembic]
script_location = alembic
prepend_sys_path = .

# Fallback URL — overridden at runtime by env.py if DATABASE_URL is set.
sqlalchemy.url = sqlite:///data/runs.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
